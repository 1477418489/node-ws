<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人人要有爱心</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: linear-gradient(135deg, #ffe4e1, #fffaf0);
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #ffffff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      max-width: 700px;
      text-align: center;
    }

    h1 {
      color: #e74c3c;
      font-size: 36px;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      line-height: 1.8;
      margin: 12px 0;
    }

    .heart {
      font-size: 48px;
      color: #ff4d6d;
      margin: 20px 0;
      animation: beat 1s infinite;
      display: inline-block;
    }

    @keyframes beat {
      0% { transform: scale(1); }
      25% { transform: scale(1.1); }
      50% { transform: scale(1); }
      75% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .footer {
      margin-top: 20px;
      font-size: 16px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>人人要有爱心</h1>
    <div class="heart">❤️</div>
    <p>爱心是一种温暖的力量，可以照亮他人，也能温暖自己。</p>
    <p>一句关心的话语，一个善意的微笑，一次真诚的帮助，都会让这个世界变得更加美好。</p>
    <p>无论在生活中、学习中，还是工作中，我们都应该学会关爱他人、帮助他人、理解他人。</p>
    <p>让我们从身边的小事做起，把爱心传递给更多的人。</p>
    <div class="footer">愿世界因爱而更加美好 🌸</div>
  </div>
</body>
</html>
